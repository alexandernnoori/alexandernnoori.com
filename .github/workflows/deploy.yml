name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache Racket packages
        uses: actions/cache@v4
        with:
          path: ~/.racket
          key: ${{ runner.os }}-racket-pollen-v1

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          version: "stable"
